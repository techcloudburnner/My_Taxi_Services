spring.datasource.url=jdbc:mysql://localhost:3306/rudra_taxi_services?serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=customlogic
spring.datasource.password=customlogic@2026
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Server Configuration
server.port=8082

# ? CORS Configuration (ADD THIS)
spring.web.cors.allowed-origins=http://localhost:3000
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# ? Static Resources
spring.mvc.static-path-pattern=/**

# Logging
logging.level.org.springframework.web.servlet.resource=INFO
logging.level.com.rudrabannataxiservices=DEBUG

# ? File Upload Configuration (FIXED - 20MB max file size)
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=50MB
spring.servlet.multipart.enabled=true

# Pagination
spring.data.web.pageable.default-page-size=10
spring.data.web.pageable.max-page-size=50

# ? Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss

# ? File upload directory
file.upload.directory=/opt/rudra-taxi/uploads