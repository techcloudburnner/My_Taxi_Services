spring.application.name=rudrabannataxiservices
#customlo_rudra_taxi_services
# Database Configuration
#spring.datasource.url=jdbc:mysql://localhost:3309/taxi_services?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
