apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment

metadata:
  name: mysql
  labels:
    app: mysql
    tier: database

spec:
  replicas: 1
  
  selector:
    matchLabels:
      app: mysql
      tier: database

  strategy:
    type: Recreate

  template:
    metadata:
      labels:
        app: mysql
        tier: database

    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          
          ports:
            - containerPort: 3306
              name: mysql

          env:
            - name: MYSQL_ROOT_PASSWORD
              value: "root1234"
            
            - name: MYSQL_DATABASE
              value: "taxi_services"
            
            - name: MYSQL_USER
              value: "taxi_user"
            
            - name: MYSQL_PASSWORD
              value: "taxi_pass"
            
            - name: MYSQL_ROOT_HOST
              value: "%"

          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"

          volumeMounts:
            - name: mysql-storage
              mountPath: /var/lib/mysql
            - name: init-script
              mountPath: /docker-entrypoint-initdb.d

          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "mysqladmin ping -h localhost -u root -p${MYSQL_ROOT_PASSWORD}"
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5

          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "mysqladmin ping -h localhost -u root -p${MYSQL_ROOT_PASSWORD}"
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5

      volumes:
        - name: mysql-storage
          persistentVolumeClaim:
            claimName: mysql-pvc
        - name: init-script
          emptyDir: {}
