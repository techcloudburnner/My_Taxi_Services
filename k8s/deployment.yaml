apiVersion: apps/v1
kind: Deployment

metadata:
  name: taxi-backend
  labels:
    app: taxi-backend
    tier: backend

spec:
  replicas: 2
  
  selector:
    matchLabels:
      app: taxi-backend
      tier: backend

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  template:
    metadata:
      labels:
        app: taxi-backend
        tier: backend

    spec:
      # Wait for MySQL to be ready
      initContainers:
        - name: check-mysql
          image: busybox:1.36
          command: ['sh', '-c', 
            'until nc -z mysql 3306; do echo "Waiting for MySQL..."; sleep 5; done;']
      
      containers:
        - name: taxi-backend
          image: rohit261/rudrabannataxiservices:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 8080
              name: http
              protocol: TCP

          env:
            - name: DB_URL
              value: "jdbc:mysql://mysql:3306/taxi_services?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true"
            
            - name: DB_USER
              value: "root"
            
            - name: DB_PASSWORD
              value: "root1234"
            
            - name: FRONTEND_URL
              value: "http://localhost:3000"
            
            - name: APP_LOG_LEVEL
              value: "INFO"
            
            - name: SHOW_SQL
              value: "false"
            
            - name: SERVER_PORT
              value: "8080"
            
            - name: SPRING_LOG_LEVEL
              value: "INFO"

          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"

          volumeMounts:
            - name: uploads
              mountPath: /app/uploads

          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

      volumes:
        - name: uploads
          emptyDir: {}
